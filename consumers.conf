# Consumer projects that depend on Deepstaging packages.
# Used by scripts/repack-consumer.sh to pack, clean, and rebuild.
#
# Format:  [name=]<path>  <dep> [<dep> ...]
#   name    Optional display name (required when basename isn't unique/meaningful)
#   path    Absolute or ~-relative path to the consumer project root
#   dep     One or more Deepstaging repo names this consumer depends on
#
# Known repos and their dependency graph:
#   roslyn → deepstaging
#
# The script resolves transitive deps automatically.

SharedNotes=~/org/oval/repos/SharedNotes/dotnet        deepstaging
~/org/oval/repos/Chat               deepstaging
Scribe=~/org/deepstaging/repos/samples/Scribe  deepstaging
